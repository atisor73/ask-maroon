<!doctype html>
<html lang="en">
  <head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-MT1JY5HRMD"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-MT1JY5HRMD');
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maroon Archive Search</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <div class="masthead">
          <p class="eyebrow">Chicago Maroon Archive</p>
          <div class="masthead-title-row">
            <h1 id="home-button" class="home-button" role="button" tabindex="0">Search The Archive</h1>
            <div class="masthead-actions">
              <button
                id="info-button"
                class="icon-button info-button"
                type="button"
                aria-expanded="false"
                aria-controls="annotation-layer"
                aria-label="Open interface guide"
              >
                i
              </button>
              <a
                class="icon-button github-button"
                href="https://github.com/atisor73/ask-maroon"
                target="_blank"
                rel="noreferrer"
                aria-label="Open GitHub repository"
                title="View source on GitHub"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path
                    d="M12 1.5a10.5 10.5 0 0 0-3.32 20.46c.53.1.72-.23.72-.5v-1.95c-2.96.64-3.59-1.26-3.59-1.26-.48-1.23-1.18-1.55-1.18-1.55-.96-.66.08-.64.08-.64 1.06.07 1.62 1.09 1.62 1.09.94 1.61 2.46 1.15 3.06.88.1-.68.37-1.15.67-1.42-2.36-.27-4.84-1.18-4.84-5.25 0-1.16.42-2.11 1.09-2.86-.11-.27-.47-1.38.1-2.88 0 0 .89-.28 2.91 1.09a10 10 0 0 1 5.3 0c2.02-1.37 2.9-1.09 2.9-1.09.58 1.5.22 2.61.11 2.88.68.75 1.09 1.7 1.09 2.86 0 4.08-2.49 4.97-4.86 5.23.38.33.72.98.72 1.98v2.94c0 .28.19.61.73.5A10.5 10.5 0 0 0 12 1.5Z"
                  />
                </svg>
              </a>
            </div>
          </div>
        </div>
        <img class="masthead-mark" src="./phoenix_trace.png" alt="Phoenix mascot" />
      </header>
      <div class="masthead-subrow">
        <button id="random-issue-button" class="random-issue-link" type="button">
          Explore a random issue!
        </button>
      </div>

      <main class="layout">
        <section class="results-panel">
          <form id="search-form" class="search-card">
            <label class="field">
              <span>Query</span>
              <input
                id="query-input"
                name="query"
                type="text"
                placeholder="Try: student protests on campus"
                required
              />
            </label>

            <div class="controls-row">
              <label class="field compact-field">
                <span>Vector backend</span>
                <select id="backend-select" name="backend">
                  <option value="sentence-transformers">sentence-transformers</option>
                  <option value="openai">openai/text-embedding-3-small</option>
                </select>
              </label>

              <label class="field compact-field">
                <span>Results</span>
                <input id="limit-input" name="limit" type="number" value="20" min="1" max="50" />
              </label>

              <button class="search-button" type="submit">Search</button>
            </div>

            <details class="advanced-search-card" id="advanced-search-card">
              <summary class="advanced-search-summary">Advanced Search</summary>

              <div class="advanced-search-body">
                <section class="year-filter-card" id="year-filter-card" hidden>
                  <div class="year-filter-header">
                    <span class="year-filter-label">Year Range</span>
                    <div class="year-slider-readout">
                      <label class="year-slider-label" for="start-year-value">
                        <span>Start</span>
                        <input id="start-year-value" class="year-value-input" type="number" />
                      </label>
                      <span class="year-slider-divider" aria-hidden="true">-</span>
                      <label class="year-slider-label" for="end-year-value">
                        <span>End</span>
                        <input id="end-year-value" class="year-value-input" type="number" />
                      </label>
                    </div>
                  </div>

                  <div class="year-dual-slider">
                    <input
                      id="start-year-input"
                      class="year-slider year-slider-start"
                      type="range"
                      list="year-decade-ticks"
                    />
                    <input
                      id="end-year-input"
                      class="year-slider year-slider-end"
                      type="range"
                      list="year-decade-ticks"
                    />
                    <div id="year-tick-marks" class="year-tick-marks" aria-hidden="true"></div>
                  </div>

                  <datalist id="year-decade-ticks"></datalist>
                </section>

                <section class="search-mode-card">
                  <div class="search-mode-header search-mode-inline">
                    <span class="year-filter-label">Search Mode</span>
                    <div class="radio-row" role="radiogroup" aria-label="Search mode">
                      <label class="radio-chip">
                        <input
                          type="radio"
                          name="search-mode"
                          value="greedy"
                          id="search-mode-greedy"
                          checked
                        />
                        <span>Greedy search</span>
                      </label>
                      <label class="radio-chip">
                        <input
                          type="radio"
                          name="search-mode"
                          value="sample"
                          id="search-mode-sample"
                        />
                        <span>Exploratory sampling</span>
                      </label>
                    </div>
                  </div>

                  <div class="sampling-row" id="sampling-controls" aria-live="polite">
                    <span class="sampling-label">Top N</span>
                    <input
                      id="sample-top-n-input"
                      class="sampling-input"
                      name="sampleTopN"
                      type="number"
                      value="100"
                      min="25"
                      max="100"
                    />

                    <span class="sampling-label">Temperature</span>
                    <input
                      id="temperature-input"
                      class="sampling-input"
                      name="temperature"
                      type="number"
                      value="1.0"
                      min="0.1"
                      max="10"
                      step="0.1"
                    />
                  </div>
                </section>
              </div>
            </details>
          </form>

          <section class="status-card" id="status-card">
            <p id="status-text">Run query, see ranked text chunk results here.</p>
          </section>

          <section class="results-list" id="results-list"></section>

          <section class="pagination-bar" id="pagination-bar" hidden>
            <button id="prev-page-button" class="pagination-button" type="button">Previous</button>
            <span id="pagination-text"></span>
            <button id="next-page-button" class="pagination-button" type="button">Next</button>
          </section>
        </section>

        <aside class="viewer-panel">
          <div class="viewer-header">
            <div class="viewer-main">
              <div class="viewer-topline">
                <p class="eyebrow">Original PDF</p>
              </div>
              <div class="viewer-heading">
                <h2 id="viewer-title">No document selected</h2>
                <p id="viewer-subtitle" class="viewer-subtitle"></p>
              </div>
            </div>
            <div class="viewer-actions">
              <button id="toggle-viewer-button" class="viewer-mode-button" type="button">
                Expand PDF-Viewer
              </button>
              <a id="open-pdf-link" class="viewer-link" href="#" target="_blank" rel="noreferrer">
                Open In New Tab
              </a>
            </div>
          </div>

          <!--
            The iframe gives us a quick MVP viewer.
            Later we can swap this for PDF.js and support page-level jumps/highlighting.
          -->
          <iframe
            id="pdf-frame"
            class="pdf-frame"
            title="Archive PDF Viewer"
            src="about:blank"
          ></iframe>
        </aside>
      </main>

      <section id="annotation-layer" class="annotation-layer" hidden aria-label="Interface guide">
        <div id="annotation-items" class="annotation-items"></div>
      </section>

      <button
        id="collapse-viewer-edge"
        class="collapse-viewer-edge"
        type="button"
        aria-label="Bring back query panel"
      >
        &gt;&gt;&gt;
      </button>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
